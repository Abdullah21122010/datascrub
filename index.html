<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>DataScrub | Free Browser-Based CSV & Excel Data Cleaner</title>
    <meta name="title" content="DataScrub | Free Browser-Based CSV & Excel Data Cleaner">
    <meta name="description" content="A fast, secure, browser-based tool to clean messy data, remove duplicates, normalize emails, and fix capitalization in CSV and XLSX files instantly.">
    <meta name="keywords" content="data cleaner, format CSV, fix excel data, remove duplicates, normalize emails, data scrubbing tool">
    <meta name="author" content="Your Name">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --bg: #0F0F0F;
            --accent: #CCFF00;
            --accent-dim: #99bf00;
            --panel: #161616;
            --border: #333333;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --danger: #FF3366;
            --font-ui: 'Inter', sans-serif;
            --font-data: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-ui);
            line-height: 1.5;
            padding: 0 20px 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
            scroll-behavior: smooth;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo-area h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.5px; }
        .logo-area h1 span { color: var(--accent); }
        .logo-area .subtitle { color: var(--text-muted); font-size: 13px; }

        .header-actions { display: flex; gap: 12px; align-items: center; }
        .auth-nav { display: flex; gap: 12px; align-items: center; }
        
        .btn-nav {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 16px;
            font-size: 13px;
            font-family: var(--font-ui);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .btn-nav:hover { border-color: var(--text-muted); }
        
        .btn-nav-primary {
            background: var(--accent);
            color: var(--bg);
            border: 1px solid var(--accent);
            font-weight: 500;
        }
        .btn-nav-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }

        .user-profile {
            display: none;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* --- MODAL SYSTEM --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-card {
            background: var(--panel);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            padding: 30px;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
        }
        .close-modal:hover { color: var(--text-main); }

        .modal-card h2 { margin-bottom: 24px; font-size: 20px; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            font-family: var(--font-ui);
            font-size: 14px;
            outline: none;
            border-radius: 4px;
            appearance: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent); }

        .auth-switch {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }
        .auth-switch a {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }
        .auth-switch a:hover { text-decoration: underline; }

        /* --- EXISTING APP STYLES --- */
        .step-label {
            font-size: 12px;
            font-family: var(--font-data);
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: block;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .input-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            height: 250px;
            position: relative;
            transition: opacity 0.3s ease, border-color 0.2s ease;
            display: flex;
            flex-direction: column;
            border-radius: 8px;
        }
        
        .input-panel.dimmed { opacity: 0.3; pointer-events: none; }
        .input-panel.active { border-color: var(--accent); }

        #drop-zone {
            border: 1px dashed var(--border);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-align: center;
        }
        #drop-zone:hover, #drop-zone.dragover { border-color: var(--accent); background: var(--panel); filter: brightness(1.2); }
        #drop-zone svg { width: 40px; height: 40px; fill: var(--text-muted); margin-bottom: 12px; transition: fill 0.2s; }
        #drop-zone:hover svg { fill: var(--accent); }
        
        #paste-area {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: var(--font-data);
            font-size: 13px;
            padding: 20px;
            resize: none;
            width: 100%;
            height: 100%;
            outline: none;
        }

        #step-2, #step-3, #step-4 { display: none; margin-bottom: 40px; }
        
        .options-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            border-radius: 8px;
        }

        .toggle-group { display: flex; align-items: center; font-size: 14px; cursor: pointer; }
        .toggle-group input { display: none; }
        .toggle-slider {
            width: 36px; height: 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            position: relative; margin-right: 10px; transition: 0.2s;
            border-radius: 10px;
        }
        .toggle-slider::after {
            content: ''; position: absolute;
            top: 2px; left: 2px; width: 14px; height: 14px;
            background: var(--text-muted); transition: 0.2s; border-radius: 50%;
        }
        .toggle-group input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
        .toggle-group input:checked + .toggle-slider::after { left: 18px; background: var(--bg); }

        .btn-full {
            width: 100%; background: var(--accent); color: #000; border: none; padding: 16px;
            font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font-ui);
            display: flex; align-items: center; justify-content: center; transition: background 0.2s;
            border-radius: 4px;
        }
        .btn-full:hover { background: var(--accent-dim); }
        
        .spinner {
            display: none; width: 20px; height: 20px; border: 2px solid #000;
            border-top: 2px solid transparent; border-radius: 50%;
            animation: spin 0.6s linear infinite; margin-right: 12px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .results-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        .row-count { font-size: 13px; color: var(--text-muted); }
        
        .table-container {
            width: 100%; overflow-x: auto; border: 1px solid var(--border);
            margin-bottom: 20px; background: var(--panel); border-radius: 8px;
        }
        
        table { width: 100%; border-collapse: collapse; font-family: var(--font-data); font-size: 12px; white-space: nowrap; }
        th, td { padding: 10px 15px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); text-align: left; }
        th { background: rgba(0,0,0,0.2); color: var(--text-muted); font-weight: 500; }
        tr:nth-child(even) { background: rgba(128, 128, 128, 0.03); }
        tr:hover { background: rgba(204, 255, 0, 0.1); }

        .export-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .btn-secondary {
            background: var(--panel); color: var(--text-main); border: 1px solid var(--border);
            padding: 12px; font-family: var(--font-ui); font-size: 14px; cursor: pointer;
            transition: all 0.2s; text-align: center; border-radius: 4px;
        }
        .btn-secondary:hover { border-color: var(--text-muted); }

        .reset-link { display: block; text-align: center; color: var(--text-muted); font-size: 13px; text-decoration: underline; cursor: pointer; }
        .reset-link:hover { color: var(--text-main); }
        
        @media (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; align-items: flex-start; gap: 20px; }
            .header-actions { width: 100%; justify-content: flex-end; flex-wrap: wrap; }
            .auth-nav, .user-profile { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>Data<span>Scrub</span></h1>
            <div class="subtitle">Quick browser-based data cleaning.</div>
        </div>
        
        <div class="header-actions">
            <button class="btn-nav" onclick="openSettingsModal()" style="padding: 8px 12px;" title="Settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--text-muted)" style="vertical-align: text-bottom; transition: fill 0.2s;">
                    <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
                </svg>
            </button>

            <div class="auth-nav" id="nav-unlogged">
                <button class="btn-nav" onclick="openAuthModal('login')">Log In</button>
                <button class="btn-nav btn-nav-primary" onclick="openAuthModal('signup')">Sign Up</button>
            </div>

            <div class="user-profile" id="nav-logged">
                <span id="display-email">user@email.com</span>
                <button class="btn-nav" onclick="handleLogout()">Log Out</button>
            </div>
        </div>
    </header>

    <div class="modal-overlay" id="auth-modal">
        <div class="modal-card">
            <button class="close-modal" onclick="closeAuthModal()">×</button>
            <h2 id="modal-title">Welcome Back</h2>
            
            <form id="auth-form" onsubmit="handleAuthSubmit(event)">
                <div class="form-group" id="group-name" style="display: none;">
                    <label>Full Name</label>
                    <input type="text" id="auth-name" placeholder="Jane Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="auth-email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" required placeholder="••••••••">
                </div>
                
                <div id="auth-message" style="color: var(--accent); font-size: 13px; text-align: center; margin-bottom: 12px; display: none;"></div>
                
                <button type="submit" class="btn-full" style="margin-top: 12px;">
                    <div class="spinner" id="auth-spinner"></div>
                    <span id="auth-submit-btn-text">Log In</span>
                </button>

                <div class="auth-switch" id="auth-switch-text">
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal-card">
            <button class="close-modal" onclick="closeSettingsModal()">×</button>
            <h2>App Settings</h2>
            
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <label class="toggle-group">
                    <input type="checkbox" id="setting-theme" onchange="toggleTheme(); saveLocalSettings();">
                    <div class="toggle-slider"></div> 
                    Enable Light Theme
                </label>

                <div class="form-group" style="margin-bottom: 0;">
                    <label>Capitalization Style</label>
                    <select id="setting-cap-style" onchange="saveLocalSettings()">
                        <option value="title">Title Case (Jane Doe)</option>
                        <option value="upper">UPPERCASE (JANE DOE)</option>
                        <option value="lower">lowercase (jane doe)</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label>Export Delimiter</label>
                    <select id="setting-delimiter" onchange="saveLocalSettings()">
                        <option value=",">Comma (,)</option>
                        <option value=";">Semicolon (;)</option>
                        <option value="\t">Tab (\t)</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label>Default Export Filename</label>
                    <input type="text" id="setting-export-name" value="cleaned_data" oninput="saveLocalSettings()">
                </div>
                
                <label class="toggle-group" style="margin-top: 10px;">
                    <input type="checkbox" id="setting-remember" onchange="saveLocalSettings()">
                    <div class="toggle-slider"></div> 
                    Remember my settings
                </label>
            </div>
            
            <button class="btn-full" style="margin-top: 24px;" onclick="closeSettingsModal()">Save & Close</button>
        </div>
    </div>

    <section id="step-1">
        <span class="step-label">Step 1 — Input</span>
        <div class="input-grid">
            <div class="input-panel" id="drop-zone">
                <svg viewBox="0 0 24 24"><path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M15.8,20H14L12,16.6L10,20H8.2L11.1,15.5L8.2,11H10L12,14.4L14,11H15.8L12.9,15.5L15.8,20M13,9V3.5L18.5,9H13Z" /></svg>
                <div style="font-size: 14px; font-weight: 500;">Drop your CSV or XLSX here</div>
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">or click to browse</div>
                <input type="file" id="file-input" accept=".csv, .xlsx" style="display: none;">
            </div>
            <div class="input-panel" id="paste-panel">
                <textarea id="paste-area" placeholder="Or paste messy text here...&#10;&#10;John smith , john@email.com , 29&#10;jane Doe , JANE@email.com , 32"></textarea>
            </div>
        </div>
    </section>

    <section id="step-2">
        <span class="step-label">Step 2 — Options</span>
        <div class="options-card">
            <label class="toggle-group"><input type="checkbox" id="opt-dup" checked><div class="toggle-slider"></div> Remove Duplicate Rows</label>
            <label class="toggle-group"><input type="checkbox" id="opt-cap" checked><div class="toggle-slider"></div> Fix Capitalization</label>
            <label class="toggle-group"><input type="checkbox" id="opt-space" checked><div class="toggle-slider"></div> Strip Extra Spaces</label>
            <label class="toggle-group"><input type="checkbox" id="opt-email" checked><div class="toggle-slider"></div> Normalize Emails</label>
            <label class="toggle-group"><input type="checkbox" id="opt-empty" checked><div class="toggle-slider"></div> Remove Empty Rows</label>
        </div>
    </section>

    <section id="step-3">
        <span class="step-label">Step 3 — Action</span>
        <button class="btn-full" id="btn-clean">
            <div class="spinner" id="clean-spinner"></div>
            <span id="clean-text">Clean My Data Now</span>
        </button>
    </section>

    <section id="step-4">
        <div class="results-header">
            <span class="step-label" style="margin-bottom: 0;">Step 4 — Results</span>
            <span class="row-count" id="row-count-display">Showing 0 of 0 rows cleaned.</span>
        </div>
        <div class="table-container">
            <table id="results-table">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <div class="export-actions">
            <button class="btn-secondary" id="btn-download">Download Clean File</button>
            <button class="btn-secondary" id="btn-copy">Copy to Clipboard</button>
        </div>
        <span class="reset-link" id="btn-reset">Clean another file</span>
    </section>

    <script>
        // --- AUTHENTICATION LOGIC ---
        let currentAuthMode = 'login';

        function openAuthModal(mode) {
            currentAuthMode = mode;
            updateAuthModalUI();
            document.getElementById('auth-message').style.display = 'none'; // Clear messages
            document.getElementById('auth-modal').style.display = 'flex';
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('auth-form').reset();
            document.getElementById('auth-message').style.display = 'none';
        }

        function toggleAuthMode() {
            currentAuthMode = currentAuthMode === 'login' ? 'signup' : 'login';
            document.getElementById('auth-message').style.display = 'none'; // Clear messages on manual toggle
            updateAuthModalUI();
        }

        function updateAuthModalUI() {
            const isLogin = currentAuthMode === 'login';
            document.getElementById('modal-title').innerText = isLogin ? 'Welcome Back' : 'Create an Account';
            document.getElementById('group-name').style.display = isLogin ? 'none' : 'block';
            document.getElementById('auth-name').required = !isLogin;
            document.getElementById('auth-submit-btn-text').innerText = isLogin ? 'Log In' : 'Sign Up';
            
            document.getElementById('auth-switch-text').innerHTML = isLogin 
                ? `Don't have an account? <a onclick="toggleAuthMode()">Sign up</a>`
                : `Already have an account? <a onclick="toggleAuthMode()">Log in</a>`;
        }

        // Helper to show inline messages
        function showAuthMessage(msg) {
            const msgBox = document.getElementById('auth-message');
            msgBox.innerText = msg;
            msgBox.style.display = 'block';
        }

        // Helper to get users from our mock DB (localStorage)
        function getRegisteredEmails() {
            return JSON.parse(localStorage.getItem('dataScrubUsers') || '[]');
        }

        function handleAuthSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim().toLowerCase();
            const btnText = document.getElementById('auth-submit-btn-text');
            const spinner = document.getElementById('auth-spinner');
            const submitBtn = document.querySelector('#auth-form button[type="submit"]');

            // Fetch mock DB and check if email exists
            const users = getRegisteredEmails();
            const emailExists = users.includes(email);

            // LOGIC: If signing up but email exists -> Switch to Login
            if (currentAuthMode === 'signup' && emailExists) {
                currentAuthMode = 'login';
                updateAuthModalUI();
                showAuthMessage("Email already registered. We switched you to Log In.");
                return; // Stop submission so they can enter password for login
            }

            // LOGIC: If logging in but email DOES NOT exist -> Switch to Sign Up
            if (currentAuthMode === 'login' && !emailExists) {
                currentAuthMode = 'signup';
                updateAuthModalUI();
                showAuthMessage("Email not found. We switched you to Sign Up.");
                return; // Stop submission so they can enter their name
            }

            // If validation passes, register the new user if they are signing up
            if (currentAuthMode === 'signup') {
                users.push(email);
                localStorage.setItem('dataScrubUsers', JSON.stringify(users));
            }

            // Proceed with the successful auth animation
            btnText.innerText = 'Processing...';
            spinner.style.display = 'block';
            submitBtn.style.pointerEvents = 'none';

            setTimeout(() => {
                btnText.innerText = currentAuthMode === 'login' ? 'Log In' : 'Sign Up';
                spinner.style.display = 'none';
                submitBtn.style.pointerEvents = 'auto';
                
                closeAuthModal();
                
                document.getElementById('nav-unlogged').style.display = 'none';
                document.getElementById('nav-logged').style.display = 'flex';
                document.getElementById('display-email').innerText = email;
            }, 800);
        }

        function handleLogout() {
            document.getElementById('nav-unlogged').style.display = 'flex';
            document.getElementById('nav-logged').style.display = 'none';
        }

        // --- SETTINGS UI LOGIC ---
        function openSettingsModal() { document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettingsModal() { document.getElementById('settings-modal').style.display = 'none'; }

        function toggleTheme() {
            const isLight = document.getElementById('setting-theme').checked;
            const root = document.documentElement;
            
            if (isLight) {
                root.style.setProperty('--bg', '#F5F5F7');
                root.style.setProperty('--panel', '#FFFFFF');
                root.style.setProperty('--text-main', '#1A1A1A');
                root.style.setProperty('--text-muted', '#666666');
                root.style.setProperty('--border', '#E5E5E5');
            } else {
                root.style.setProperty('--bg', '#0F0F0F');
                root.style.setProperty('--panel', '#161616');
                root.style.setProperty('--text-main', '#FFFFFF');
                root.style.setProperty('--text-muted', '#888888');
                root.style.setProperty('--border', '#333333');
            }
        }

        // --- SAFE LOCAL STORAGE LOGIC ---
        function saveLocalSettings() {
            try {
                if (!document.getElementById('setting-remember').checked) {
                    localStorage.removeItem('dataScrubSettings');
                    return;
                }
                
                const settings = {
                    theme: document.getElementById('setting-theme').checked,
                    capStyle: document.getElementById('setting-cap-style').value,
                    delimiter: document.getElementById('setting-delimiter').value,
                    exportName: document.getElementById('setting-export-name').value,
                    remember: true
                };
                localStorage.setItem('dataScrubSettings', JSON.stringify(settings));
            } catch(e) {
                console.warn("Could not save settings.", e);
            }
        }

        function loadLocalSettings() {
            try {
                const saved = localStorage.getItem('dataScrubSettings');
                if (!saved) return;
                
                const settings = JSON.parse(saved);
                
                if (settings.theme !== undefined) document.getElementById('setting-theme').checked = settings.theme;
                if (settings.capStyle) document.getElementById('setting-cap-style').value = settings.capStyle;
                if (settings.delimiter) document.getElementById('setting-delimiter').value = settings.delimiter;
                if (settings.exportName) document.getElementById('setting-export-name').value = settings.exportName;
                if (settings.remember !== undefined) document.getElementById('setting-remember').checked = settings.remember;
                
                if (settings.theme) toggleTheme(); 
            } catch(e) {
                console.warn("Could not load settings. Resetting to defaults.", e);
                localStorage.removeItem('dataScrubSettings');
            }
        }

        // Initialize settings safely on load
        loadLocalSettings();

        // --- APP LOGIC (DataScrub) ---
        let rawData = [];
        let cleanData = [];

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const pastePanel = document.getElementById('paste-panel');
        const pasteArea = document.getElementById('paste-area');
        const step2 = document.getElementById('step-2');
        const step3 = document.getElementById('step-3');
        const step4 = document.getElementById('step-4');
        
        // Input Handling
        pasteArea.addEventListener('input', () => {
            try {
                if (pasteArea.value.trim().length > 0) {
                    dropZone.classList.add('dimmed');
                    pastePanel.classList.add('active');
                    rawData = Papa.parse(pasteArea.value).data || [];
                    showOptions();
                } else {
                    dropZone.classList.remove('dimmed');
                    pastePanel.classList.remove('active');
                    hideSteps();
                }
            } catch(e) {
                console.error("Error parsing pasted data.", e);
            }
        });

        dropZone.addEventListener('click', () => fileInput.click());
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); }));
        ['dragenter', 'dragover'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.add('dragover')));
        ['dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.remove('dragover')));
        dropZone.addEventListener('drop', (e) => handleFile(e.dataTransfer.files[0]));
        fileInput.addEventListener('change', function(e) { handleFile(e.target.files[0]); this.value = null; });

        function handleFile(file) {
            if (!file) return;
            pastePanel.classList.add('dimmed');
            dropZone.classList.add('active');
            
            try {
                if (file.name.endsWith('.csv')) {
                    Papa.parse(file, { complete: function(results) { rawData = results.data || []; showOptions(); } });
                } else if (file.name.endsWith('.xlsx')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                        rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1}) || [];
                        showOptions();
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    alert("Please upload a CSV or XLSX file.");
                    document.getElementById('btn-reset').click();
                }
            } catch(e) {
                console.error("Error handling file upload.", e);
                alert("There was an error reading the file.");
            }
        }

        function showOptions() {
            if (rawData && rawData.length > 0) {
                step2.style.display = 'block'; step3.style.display = 'block';
                step3.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function hideSteps() { step2.style.display = 'none'; step3.style.display = 'none'; step4.style.display = 'none'; rawData = []; }

        // Processing
        document.getElementById('btn-clean').addEventListener('click', () => {
            const btnClean = document.getElementById('btn-clean');
            document.getElementById('clean-spinner').style.display = 'block';
            document.getElementById('clean-text').innerText = 'Processing...';
            btnClean.style.pointerEvents = 'none';

            setTimeout(() => {
                try {
                    processData();
                    document.getElementById('clean-spinner').style.display = 'none';
                    document.getElementById('clean-text').innerText = 'Clean My Data Now';
                    btnClean.style.pointerEvents = 'auto';
                    
                    step4.style.display = 'block';
                    step4.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } catch (e) {
                    console.error("Error during processing:", e);
                    document.getElementById('clean-spinner').style.display = 'none';
                    document.getElementById('clean-text').innerText = 'Error Processing Data';
                    btnClean.style.pointerEvents = 'auto';
                }
            }, 600);
        });

        function processData() {
            const optDup = document.getElementById('opt-dup').checked;
            const optCap = document.getElementById('opt-cap').checked;
            const optSpace = document.getElementById('opt-space').checked;
            const optEmail = document.getElementById('opt-email').checked;
            const optEmpty = document.getElementById('opt-empty').checked;
            const capStyle = document.getElementById('setting-cap-style').value;

            let processed = rawData.map(row => Array.isArray(row) ? [...row] : []);
            const emailRegex = /\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b/gi;

            processed = processed.map(row => row.map(cell => {
                if (cell === null || cell === undefined) cell = '';
                let str = String(cell);
                
                if (optSpace) str = str.trim().replace(/\s+/g, ' ');
                
                if (optCap) {
                    if (capStyle === 'title') {
                        str = str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
                    } else if (capStyle === 'upper') {
                        str = str.toUpperCase();
                    } else if (capStyle === 'lower') {
                        str = str.toLowerCase();
                    }
                }
                
                if (optEmail) str = str.replace(emailRegex, m => m.toLowerCase());
                return str;
            }));

            if (optEmpty) processed = processed.filter(row => row.some(cell => String(cell).trim() !== ''));
            if (optDup) {
                const seen = new Set();
                processed = processed.filter(row => {
                    const strRep = JSON.stringify(row);
                    if (seen.has(strRep)) return false;
                    seen.add(strRep); return true;
                });
            }
            cleanData = processed;
            renderTable();
        }

        // Results Table & Export
        function renderTable() {
            const thead = document.getElementById('table-head'); const tbody = document.getElementById('table-body');
            thead.innerHTML = ''; tbody.innerHTML = '';
            if (!cleanData || cleanData.length === 0) return;

            const trHead = document.createElement('tr');
            cleanData[0].forEach(cell => { const th = document.createElement('th'); th.innerText = cell; trHead.appendChild(th); });
            thead.appendChild(trHead);

            for (let i = 1; i < Math.min(cleanData.length, 11); i++) {
                const tr = document.createElement('tr');
                cleanData[i].forEach(cell => { const td = document.createElement('td'); td.innerText = cell; tr.appendChild(td); });
                tbody.appendChild(tr);
            }
            
            const totalRows = Math.max(0, cleanData.length - 1);
            const displayRows = Math.min(10, totalRows);
            document.getElementById('row-count-display').innerText = `Showing ${displayRows} of ${totalRows} rows cleaned.`;
        }

        document.getElementById('btn-download').addEventListener('click', () => {
            try {
                const delimiter = document.getElementById('setting-delimiter').value || ',';
                const csvString = Papa.unparse(cleanData, { delimiter: delimiter });
                const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
                
                const a = document.createElement('a'); 
                a.href = URL.createObjectURL(blob); 
                
                const customName = document.getElementById('setting-export-name').value.trim();
                const ext = delimiter === '\t' ? '.tsv' : '.csv';
                
                if (customName) {
                    a.download = customName.includes('.') ? customName : customName + ext;
                } else {
                    a.download = 'cleaned_data' + ext;
                }
                
                document.body.appendChild(a); 
                a.click(); 
                document.body.removeChild(a);
            } catch (e) {
                console.error("Error generating download:", e);
                alert("Failed to create download file.");
            }
        });

        document.getElementById('btn-copy').addEventListener('click', (e) => {
            const btn = e.target;
            try {
                navigator.clipboard.writeText(cleanData.map(row => row.join('\t')).join('\n')).then(() => {
                    const original = btn.innerText; btn.innerText = 'Copied!'; btn.style.color = 'var(--accent)';
                    setTimeout(() => { btn.innerText = original; btn.style.color = 'var(--text-main)'; }, 2000);
                });
            } catch(e) {
                console.error("Clipboard copy failed:", e);
            }
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            pasteArea.value = '';
            pastePanel.classList.remove('dimmed', 'active');
            dropZone.classList.remove('dimmed', 'active');
            ['opt-dup', 'opt-cap', 'opt-space', 'opt-email', 'opt-empty'].forEach(id => document.getElementById(id).checked = true);
            hideSteps();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
